[build]
  functions = "netlify/functions"
  publish = "."

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["stripe"]

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/"
  to = "/account.html"
  status = 200
  conditions = {Query = ["confirmation_token"]}

[[redirects]]
  from = "/"
  to = "/account.html"
  status = 200
  conditions = {Query = ["recovery_token"]}

[[redirects]]
  from = "/"
  to = "/account.html"
  status = 200
  conditions = {Query = ["invite_token"]}

[[redirects]]
  from = "/account"
  to = "/account.html"
  status = 200

[[redirects]]
  from = "/.netlify/identity"
  to = "/.netlify/identity"
  status = 200
  force = true
