<div class="page-content">

<h1>Gallery</h1>
<p>Some of our favorite treats and creations 🍓</p>

<div class="gallery">

<img src="strawberry1.jpg" onclick="openLightbox(0)">
<img src="strawberry2.jpg" onclick="openLightbox(1)">
<img src="box1.jpg" onclick="openLightbox(2)">
<img src="bouquet1.jpg" onclick="openLightbox(3)">
<img src="dessertbox1.jpg" onclick="openLightbox(4)">
<img src="strawberry3.jpg" onclick="openLightbox(5)">

</div>

</div>

<footer>
© 2026 Dipped Sweetz by Camila
</footer>


<!-- LIGHTBOX -->

<div id="lightbox">

<span class="close" onclick="closeLightbox()">×</span>

<img id="lightbox-img">

<div class="lightbox-controls">

<button onclick="prevImage()">‹</button>
<button onclick="nextImage()">›</button>

</div>

</div>


<script>

const images = [
"strawberry1.jpg",
"strawberry2.jpg",
"box1.jpg",
"bouquet1.jpg",
"dessertbox1.jpg",
"strawberry3.jpg"
]

let currentIndex = 0

function openLightbox(index){
currentIndex = index
document.getElementById("lightbox").style.display="flex"
document.getElementById("lightbox-img").src = images[index]
}

function closeLightbox(){
document.getElementById("lightbox").style.display="none"
}

function nextImage(){
currentIndex = (currentIndex + 1) % images.length
document.getElementById("lightbox-img").src = images[currentIndex]
}

function prevImage(){
currentIndex = (currentIndex - 1 + images.length) % images.length
document.getElementById("lightbox-img").src = images[currentIndex]
}

</script>

</body>
